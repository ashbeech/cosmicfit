<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light only" />
  <meta name="supported-color-schemes" content="light only" />
  <title>Your Cosmic Fit verification code</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap');
    body { margin:0; padding:0; width:100% !important; }
    a { color:#7E69E6; }
    @media (max-width:480px) {
      .cf-card { width:100% !important; border-radius:0 !important; }
      .cf-pad { padding-left:24px !important; padding-right:24px !important; }
    }
  </style>
</head>
<body style="margin:0; padding:0; background-color:#000210; font-family:'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <div style="display:none; max-height:0; overflow:hidden; opacity:0; color:transparent; font-size:1px; line-height:1px;">{{ .Token }} is your Cosmic Fit verification code.&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;</div>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#000210;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table role="presentation" class="cf-card" width="480" cellpadding="0" cellspacing="0" style="width:480px; max-width:480px; background-color:#DEDEDE; border-radius:18px; overflow:hidden;">

          <!-- Brand lockup -->
          <tr>
            <td align="center" class="cf-pad" style="padding:40px 40px 8px;">
              <img src="https://cosmicfit.app/assets/email/cosmicfit-logo.png" width="150" alt="Cosmic Fit"
                   style="display:block; width:150px; max-width:60%; height:auto; border:0;" />
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td align="center" class="cf-pad" style="padding:24px 40px 8px; text-align:center;">
              
      <h1 style="margin:0 0 14px; font-family:'PT Serif', Georgia, 'Times New Roman', serif; font-size:26px; line-height:1.2; font-weight:700; color:#000210; letter-spacing:0.01em;">Your verification code</h1>
      <p style="margin:0 0 16px; font-family:'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size:16px; line-height:1.6; color:#595A62;">Enter this code to continue.</p>
      
  <div style="margin:4px 0 8px;">
    <div style="display:inline-block; padding:18px 40px; background-color:rgba(126,105,230,0.08); border-radius:14px; border:2px dashed #7E69E6;">
      <span style="font-family:'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size:40px; font-weight:700; letter-spacing:12px; color:#000210; padding-left:12px;">{{ .Token }}</span>
    </div>
  </div>
      <div style="height:16px; line-height:16px;">&nbsp;</div>
      <p style="margin:0; font-family:'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size:13px; line-height:1.6; color:#6F7077;">If you didn't request this, you can safely ignore this email.</p>
    
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" class="cf-pad" style="padding:28px 40px 36px;">
              <div style="border-top:1px solid rgba(0,2,16,0.16); padding-top:20px;">
                <p style="margin:0 0 6px; font-family:'PT Serif', Georgia, 'Times New Roman', serif; font-style:italic; font-size:14px; color:#000210;">
                  Your style, written in the stars.
                </p>
                <p style="margin:0; font-family:'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size:12px; line-height:1.6; color:#6F7077;">
                  Need help? <a href="mailto:help@cosmicfit.app" style="color:#7E69E6; text-decoration:none;">help@cosmicfit.app</a>
                </p>
              </div>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
