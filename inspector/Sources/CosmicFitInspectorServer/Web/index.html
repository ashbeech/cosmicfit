<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Fit Inspector</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header id="control-strip">
    <div class="strip-row">
      <div class="control-group engine-group">
        <label for="engine-select">Engine</label>
        <div class="engine-row">
          <select id="engine-select"></select>
          <span id="engine-chip" class="engine-chip" title="Daily Fit preset (not Style Guide engine version)">production</span>
        </div>
      </div>
      <div class="control-group">
        <label for="preset-select">Preset</label>
        <select id="preset-select">
          <option value="custom">Custom</option>
        </select>
      </div>
      <div class="control-group">
        <label for="saved-profile-select">Saved profiles</label>
        <select id="saved-profile-select">
          <option value="">—</option>
        </select>
      </div>
      <div class="control-group">
        <label for="saved-profile-name">Profile label</label>
        <input type="text" id="saved-profile-name" class="saved-profile-name-input" placeholder="Name in saved list" disabled autocomplete="off" title="Custom label for the selected saved profile">
      </div>
      <div class="control-group saved-profile-actions">
        <label class="label-spacer">&nbsp;</label>
        <div class="btn-row">
          <button type="button" id="rename-profile-btn" class="small-btn" disabled title="Apply label to selected saved profile">Rename</button>
          <button type="button" id="save-profile-btn" class="small-btn" title="Save current inputs (Submit first; uses label if set, else engine display name)">Save</button>
          <button type="button" id="delete-profile-btn" class="small-btn" disabled title="Delete selected saved profile">Delete</button>
        </div>
      </div>
      <div class="control-group name-chip-group">
        <label>Name</label>
        <span id="display-name" class="name-chip">--</span>
      </div>
      <div class="control-group">
        <label for="birth-date">Birth Date <span class="label-hint">(dd/mm/yyyy)</span></label>
        <input type="text" id="birth-date" class="date-input" placeholder="dd/mm/yyyy" value="11/12/1984" inputmode="numeric" autocomplete="off">
      </div>
      <div class="control-group">
        <label for="birth-time">Birth Time</label>
        <div class="inline-fields">
          <input type="time" id="birth-time" value="00:00">
          <label class="checkbox-label">
            <input type="checkbox" id="unknown-time"> Unknown
          </label>
        </div>
      </div>
      <div class="control-group location-group">
        <label for="location-input">Location</label>
        <input type="text" id="location-input" placeholder="City, Country" value="London, UK" autocomplete="off">
        <div id="location-results" class="autocomplete-dropdown"></div>
        <span id="location-coords" class="coords-chip" title="Resolved latitude, longitude">51.5074, -0.1278</span>
        <input type="hidden" id="latitude" value="51.5074">
        <input type="hidden" id="longitude" value="-0.1278">
      </div>
      <div class="control-group">
        <label>TZ</label>
        <span id="tz-chip" class="tz-chip">Europe/London</span>
        <input type="hidden" id="timezone-id" value="Europe/London">
      </div>
      <div class="control-group">
        <label for="profile-id">Profile ID <span class="label-hint">(optional)</span></label>
        <input type="text" id="profile-id" class="profile-id-input" placeholder="UUID from app" autocomplete="off">
      </div>
      <div class="control-group">
        <label for="device-lat">Device Location <span class="label-hint">(optional, for transit angles)</span></label>
        <div class="device-location-row">
          <input type="text" id="device-lat" class="device-location-input" placeholder="Lat" autocomplete="off">
          <input type="text" id="device-lon" class="device-location-input" placeholder="Lon" autocomplete="off">
        </div>
      </div>
      <button id="submit-btn" class="submit-btn">Submit</button>
    </div>
    <div class="strip-row strip-row-secondary">
      <div class="control-group">
        <label for="target-date">Daily Fit Target Date <span class="label-hint">(dd/mm/yyyy, local calendar day)</span></label>
        <div class="inline-fields">
          <input type="text" id="target-date" class="date-input" placeholder="dd/mm/yyyy" inputmode="numeric" autocomplete="off">
          <button id="today-btn" class="small-btn">Today (UTC)</button>
        </div>
      </div>
      <div class="compare-controls">
        <label class="checkbox-label" title="Horizontal day carousel in Daily Fit, Trace, and Verdicts starting at your target UTC date">
          <input type="checkbox" id="compare-toggle"> Compare days
        </label>
        <div id="compare-span-controls" class="compare-span-controls hidden" title="Number of UTC days in the compare carousel (target → future)">
          <button type="button" id="compare-days-down" class="small-btn compare-step-btn" aria-label="Fewer days">−</button>
          <span id="compare-days-value" class="compare-days-value">2</span>
          <button type="button" id="compare-days-up" class="small-btn compare-step-btn" aria-label="More days">+</button>
          <span class="compare-span-hint">days</span>
        </div>
        <label class="checkbox-label" title="Side-by-side Daily Fit, Trace, and Verdicts for two engine presets on the same UTC target date (separate tarot state per engine)">
          <input type="checkbox" id="compare-engines-toggle"> Compare engines
        </label>
        <div id="compare-engines-controls" class="compare-engines-controls hidden" title="Pick two registry engine ids for the same target UTC day">
          <select id="compare-engine-a" aria-label="Engine column A"></select>
          <span class="compare-engine-vs">vs</span>
          <select id="compare-engine-b" aria-label="Engine column B"></select>
        </div>
      </div>
      <div id="status-indicator" class="status"></div>
      <span id="build-stamp" class="build-stamp" title="Inspector binary build timestamp"></span>
    </div>
  </header>

  <main id="output">
    <div id="loading" class="loading hidden">Computing...</div>
    <div id="error-banner" class="error-banner hidden"></div>

    <!-- Natal Chart -->
    <section class="card" id="natal-card">
      <h2 class="card-header" data-toggle="natal-body">
        <span class="card-header-title">Natal Chart <span class="toggle-icon">▼</span></span>
        <button type="button" class="export-btn" data-export="natal" disabled title="Download this section as Markdown">Export MD</button>
      </h2>
      <div id="natal-body" class="card-body"></div>
    </section>

    <!-- Style Guide (Blueprint) -->
    <section class="card" id="blueprint-card">
      <h2 class="card-header" data-toggle="blueprint-body">
        <span class="card-header-title">Style Guide <span class="frozen-label">(natal — frozen for this profile)</span> <span class="toggle-icon">▼</span></span>
        <button type="button" class="export-btn" data-export="blueprint" disabled title="Download this section as Markdown">Export MD</button>
      </h2>
      <div id="blueprint-body" class="card-body"></div>
    </section>

    <!-- Daily Fit -->
    <section class="card" id="dailyfit-card">
      <h2 class="card-header" data-toggle="dailyfit-body">
        <span class="card-header-title">Daily Fit <span class="toggle-icon">▼</span></span>
        <button type="button" class="export-btn" data-export="dailyfit" disabled title="Download this section as Markdown">Export MD</button>
      </h2>
      <div id="dailyfit-body" class="card-body"></div>
    </section>

    <!-- Trace & Provenance -->
    <section class="card" id="trace-card">
      <h2 class="card-header" data-toggle="trace-body">
        <span class="card-header-title">Trace &amp; Provenance <span class="toggle-icon">▼</span></span>
        <button type="button" class="export-btn" data-export="trace" disabled title="Download this section as Markdown">Export MD</button>
      </h2>
      <div id="trace-body" class="card-body"></div>
    </section>

    <!-- Verdicts -->
    <section class="card" id="verdict-card">
      <h2 class="card-header" data-toggle="verdict-body">
        <span class="card-header-title">Verdicts <span class="toggle-icon">▼</span></span>
        <button type="button" class="export-btn" data-export="verdicts" disabled title="Download this section as Markdown">Export MD</button>
      </h2>
      <div id="verdict-body" class="card-body"></div>
    </section>

  </main>

  <!-- Drill-down drawer -->
  <aside id="drill-drawer" class="drawer hidden">
    <div class="drawer-header">
      <h3 id="drawer-title">Detail</h3>
      <button id="drawer-close" class="drawer-close">&times;</button>
    </div>
    <div id="drawer-content" class="drawer-content"></div>
  </aside>

  <script type="module" src="/app.js"></script>
</body>
</html>
