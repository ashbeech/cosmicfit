<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Fit Inspector</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header id="control-strip">
    <div class="strip-row">
      <div class="control-group">
        <label for="preset-select">Preset</label>
        <select id="preset-select">
          <option value="custom">Custom</option>
        </select>
      </div>
      <div class="control-group name-chip-group">
        <label>Name</label>
        <span id="display-name" class="name-chip">--</span>
      </div>
      <div class="control-group">
        <label for="birth-date">Birth Date <span class="label-hint">(dd/mm/yyyy)</span></label>
        <input type="text" id="birth-date" class="date-input" placeholder="dd/mm/yyyy" value="11/12/1984" inputmode="numeric" autocomplete="off">
      </div>
      <div class="control-group">
        <label for="birth-time">Birth Time</label>
        <input type="time" id="birth-time" value="00:00">
        <label class="checkbox-label">
          <input type="checkbox" id="unknown-time"> Unknown
        </label>
      </div>
      <div class="control-group location-group">
        <label for="location-input">Location</label>
        <input type="text" id="location-input" placeholder="City, Country" value="London, UK" autocomplete="off">
        <div id="location-results" class="autocomplete-dropdown"></div>
        <span id="location-coords" class="coords-chip" title="Resolved latitude, longitude">51.5074, -0.1278</span>
        <input type="hidden" id="latitude" value="51.5074">
        <input type="hidden" id="longitude" value="-0.1278">
      </div>
      <div class="control-group">
        <label>TZ</label>
        <span id="tz-chip" class="tz-chip">Europe/London</span>
        <input type="hidden" id="timezone-id" value="Europe/London">
      </div>
      <button id="submit-btn" class="submit-btn">Submit</button>
    </div>
    <div class="strip-row strip-row-secondary">
      <div class="control-group">
        <label for="target-date">Daily Fit Target Date <span class="label-hint">(dd/mm/yyyy, UTC)</span></label>
        <input type="text" id="target-date" class="date-input" placeholder="dd/mm/yyyy" inputmode="numeric" autocomplete="off">
        <button id="today-btn" class="small-btn">Today (UTC)</button>
      </div>
      <label class="checkbox-label">
        <input type="checkbox" id="compare-toggle"> Compare to previous day
      </label>
      <div id="status-indicator" class="status"></div>
    </div>
  </header>

  <main id="output">
    <div id="loading" class="loading hidden">Computing...</div>
    <div id="error-banner" class="error-banner hidden"></div>

    <!-- Natal Chart -->
    <section class="card" id="natal-card">
      <h2 class="card-header" data-toggle="natal-body">Natal Chart <span class="toggle-icon">▼</span></h2>
      <div id="natal-body" class="card-body"></div>
    </section>

    <!-- Style Guide (Blueprint) -->
    <section class="card" id="blueprint-card">
      <h2 class="card-header" data-toggle="blueprint-body">
        Style Guide <span class="frozen-label">(natal — frozen for this profile)</span>
        <span class="toggle-icon">▼</span>
      </h2>
      <div id="blueprint-body" class="card-body"></div>
    </section>

    <!-- Daily Fit -->
    <section class="card" id="dailyfit-card">
      <h2 class="card-header" data-toggle="dailyfit-body">Daily Fit <span class="toggle-icon">▼</span></h2>
      <div id="dailyfit-body" class="card-body"></div>
    </section>

    <!-- Trace & Provenance -->
    <section class="card" id="trace-card">
      <h2 class="card-header" data-toggle="trace-body">Trace &amp; Provenance <span class="toggle-icon">▼</span></h2>
      <div id="trace-body" class="card-body"></div>
    </section>

    <!-- Verdicts -->
    <section class="card" id="verdict-card">
      <h2 class="card-header" data-toggle="verdict-body">Verdicts <span class="toggle-icon">▼</span></h2>
      <div id="verdict-body" class="card-body"></div>
    </section>

    <!-- Day Diff (hidden by default) -->
    <section class="card hidden" id="diff-card">
      <h2 class="card-header" data-toggle="diff-body">Day Comparison <span class="toggle-icon">▼</span></h2>
      <div id="diff-body" class="card-body"></div>
    </section>
  </main>

  <!-- Drill-down drawer -->
  <aside id="drill-drawer" class="drawer hidden">
    <div class="drawer-header">
      <h3 id="drawer-title">Detail</h3>
      <button id="drawer-close" class="drawer-close">&times;</button>
    </div>
    <div id="drawer-content" class="drawer-content"></div>
  </aside>

  <script src="/app.js"></script>
</body>
</html>
